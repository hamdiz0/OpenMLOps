services:
    # MinIO - S3-compatible object storage for DVC and MLflow artifacts
    minio:
        image: minio/minio:latest
        container_name: mlops-minio
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - minio_data:/data
        healthcheck:
            test:
                ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - mlops-network

    # Create MinIO buckets on startup
    minio-init:
        image: minio/mc:latest
        container_name: mlops-minio-init
        depends_on:
            minio:
                condition: service_healthy
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
        entrypoint: >
            /bin/sh -c "
            mc alias set minio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
            mc mb minio/dvc-data --ignore-existing;
            mc mb minio/${MLFLOW_ARTIFACT_BUCKET} --ignore-existing;
            mc mb minio/zenml-artifacts --ignore-existing;
            mc anonymous set download minio/${MLFLOW_ARTIFACT_BUCKET};
            echo 'Buckets created successfully';
            exit 0;
            "
        networks:
            - mlops-network

    # MySQL - Backend database for MLflow and ZenML
    mysql:
        image: mysql:8.0
        container_name: mlops-mysql
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
            MYSQL_USER: ${MYSQL_USER:-mlops}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mlops}
            MYSQL_DATABASE: mlflow
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s
        networks:
            - mlops-network

    # MLflow - Experiment tracking and model registry
    mlflow:
        build:
            context: .
            dockerfile: docker/mlflow.Dockerfile
        container_name: mlops-mlflow
        depends_on:
            mysql:
                condition: service_healthy
            minio-init:
                condition: service_completed_successfully
        environment:
            MLFLOW_BACKEND_STORE_URI: mysql+pymysql://${MYSQL_USER:-mlops}:${MYSQL_PASSWORD:-mlops}@mysql:3306/mlflow
            MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://${MLFLOW_ARTIFACT_BUCKET}/
            AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
            AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
            MLFLOW_S3_ENDPOINT_URL: http://minio:9000
        command: >
            mlflow server
            --backend-store-uri mysql+pymysql://${MYSQL_USER:-mlops}:${MYSQL_PASSWORD:-mlops}@mysql:3306/mlflow
            --default-artifact-root s3://${MLFLOW_ARTIFACT_BUCKET}/
            --host 0.0.0.0
            --port 5000
        ports:
            - "5000:5000"
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 30s
        networks:
            - mlops-network

    # ZenML Server - Pipeline orchestration
    zenml-server:
        image: zenmldocker/zenml-server:latest
        container_name: mlops-zenml
        depends_on:
            mysql:
                condition: service_healthy
        environment:
            ZENML_STORE_URL: mysql://${MYSQL_USER:-mlops}:${MYSQL_PASSWORD:-mlops}@mysql:3306/zenml
            ZENML_SERVER_DEPLOYMENT_TYPE: docker
            ZENML_LOGGING_VERBOSITY: INFO
            ZENML_DEFAULT_PROJECT_NAME: mlops-cifar10
        ports:
            - "8080:8080"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 60s
        networks:
            - mlops-network

    # Pipeline Runner - Where training and monitoring pipelines run
    pipeline-runner:
        build:
            context: .
            dockerfile: docker/Dockerfile
        container_name: mlops-pipeline-runner
        depends_on:
            mlflow:
                condition: service_healthy
            minio-init:
                condition: service_completed_successfully
        environment:
            # MinIO/S3 configuration
            AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
            AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
            MLFLOW_S3_ENDPOINT_URL: http://minio:9000
            MLFLOW_TRACKING_URI: http://mlflow:5000
            # ZenML configuration - connect to ZenML server via REST API
            ZENML_STORE_URL: http://zenml-server:8080
            # DVC remote configuration
            DVC_REMOTE_URL: s3://dvc-data
            DVC_REMOTE_ENDPOINT_URL: http://minio:9000
            # Python path
            PYTHONPATH: /app
        volumes:
            - ./src:/app/src
            - ./scripts:/app/scripts
            - ./data:/app/data
            - ./configs:/app/configs
            - ./.dvc:/app/.dvc
            - ./run_training.py:/app/run_training.py
            - ./run_monitoring.py:/app/run_monitoring.py
        working_dir: /app
        stdin_open: true
        tty: true
        command: tail -f /dev/null
        networks:
            - mlops-network

volumes:
    minio_data:
    mysql_data:

networks:
    mlops-network:
        driver: bridge
